<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crowd Snake</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-app-version="0.2.4" data-app-commit-sha="local-dev">
    <main class="shell">
      <section class="status-panel">
        <div class="notice" id="update-banner" hidden>
          <strong>New build ready:</strong>
          <span id="update-version">refresh to load latest changes</span>
          <button type="button" id="refresh-button">Refresh page</button>
        </div>

        <label class="nickname-control" for="nickname-input">
          <span class="label">Nickname</span>
          <input
            type="text"
            id="nickname-input"
            name="nickname"
            maxlength="24"
            autocomplete="nickname"
            spellcheck="false"
            placeholder="anonymous"
          />
        </label>

        <div class="hud">
          <div>
            <span class="label">Score</span>
            <span class="value" id="score">0</span>
          </div>
          <div>
            <span class="label">Status</span>
            <span class="value" id="status">Running</span>
          </div>
          <div>
            <span class="label">Version</span>
            <span class="value" id="current-version">0.2.4</span>
          </div>
          <div>
            <span class="label">Server Best</span>
            <span class="value" id="server-best">--</span>
          </div>
          <div>
            <span class="label">Best By</span>
            <span class="value" id="server-best-nickname">--</span>
          </div>
        </div>
      </section>

      <section class="game-panel">
        <canvas
          id="game-board"
          width="360"
          height="360"
          aria-label="Snake game board"
          role="img"
        ></canvas>

        <div class="controls">
          <button type="button" id="restart-button">Restart</button>
          <p>Use arrow keys. Hit space after a crash to start again.</p>
        </div>
      </section>
    </main>

    <script src="/assets/game.js" defer></script>
  </body>
</html>
