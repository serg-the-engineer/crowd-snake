services:
  db:
    image: postgres:16-alpine
    command:
      - postgres
      - -p
      - "5433"
    environment:
      POSTGRES_DB: crowd_snake
      POSTGRES_USER: crowd_snake
      POSTGRES_PASSWORD: crowd_snake
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5433 -U crowd_snake -d crowd_snake"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - crowd-snake-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --port
      - "6380"
      - --save
      - "60"
      - "1"
      - --appendonly
      - "yes"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - crowd-snake-redis-data:/data
    restart: unless-stopped

  api:
    build:
      context: ./api
    environment:
      DEMO_API_PORT: "9001"
      DEMO_DATABASE_URL: postgresql://crowd_snake:crowd_snake@db:5433/crowd_snake?sslmode=disable
      DEMO_REDIS_URL: redis://redis:6380/0
    expose:
      - "9001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9001/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    image: nginx:1.27.5-alpine
    expose:
      - "8081"
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/demo-auth.htpasswd:/etc/nginx/conf.d/demo-auth.htpasswd:ro
      - ./site:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8081/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  crowd-snake-postgres-data:
  crowd-snake-redis-data:
